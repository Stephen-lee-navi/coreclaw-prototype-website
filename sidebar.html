<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 10px;
        }

        body {
            font-size: 1.6rem;
            line-height: 2.6rem;
            font-weight: 400;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: #f5f7fa;
            color: #1a1a1a;
        }

        .sidebar {
            width: 28rem;
            background: #f5f7fa;
            border-right: 1px solid #e5e5e5;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            overflow-y: auto;
            padding: 2.4rem;
        }

        .sidebar-header {
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1a1a;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 3.6rem;
            height: 3.6rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .nav-section {
            margin-bottom: 2.4rem;
        }

        .nav-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1.2rem;
            padding-left: 1rem;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.4rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            padding: 1rem 1.2rem;
            border-radius: 8px;
            color: #555;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-link:hover {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .nav-link.active {
            background: #e8e8e8;
            color: #1a1a1a;
        }

        .nav-icon {
            width: 2.4rem;
            height: 2.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/" class="logo" target="_parent">
                <div class="logo-icon">C</div>
                CoreClaw
            </a>
        </div>

        <nav>
            <div class="nav-section">
                <div class="nav-title">导航</div>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="/" class="nav-link" target="_parent">
                            <span class="nav-icon">🏠</span>
                            首页
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/pages/" class="nav-link" target="_parent">
                            <span class="nav-icon">📄</span>
                            所有页面
                        </a>
                    </li>
                </ul>
            </div>

            <div class="nav-section">
                <div class="nav-title">数据抓取</div>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="/pages/google-maps-scraper.html" class="nav-link" target="_parent">
                            <span class="nav-icon">🗺️</span>
                            Google Maps
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/pages/amazon-data-scraping-solutions.html" class="nav-link" target="_parent">
                            <span class="nav-icon">🛒</span>
                            Amazon
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/pages/tiktok-data-scraping-solutions.html" class="nav-link" target="_parent">
                            <span class="nav-icon">📱</span>
                            TikTok
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/pages/instagram-data-scraping-solutions.html" class="nav-link" target="_parent">

                            Instagram
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/pages/youtube-data-scraping-solutions.html" class="nav-link" target="_parent">
                            <span class="nav-icon">🎬</span>
                            YouTube
                        </a>
                    </li>
                </ul>
            </div>

            <div class="nav-section">
                <div class="nav-title">云端服务</div>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="/pages/workers.html" class="nav-link" target="_parent">
                            <span class="nav-icon">⚡</span>
                            Workers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/pages/dataset.html" class="nav-link" target="_parent">
                            <span class="nav-icon">📊</span>
                            数据集
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</body>
</html>
